<!DOCTYPE html>
<html>
<head>
    <title>DevConnect WebSocket Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #0a0a0f; color: #e2e8f0; }
        input, button { padding: 8px; margin: 5px; border-radius: 4px; }
        input { width: 400px; background: #1e293b; color: white; border: 1px solid #334155; }
        button { background: #00ff87; color: black; border: none; cursor: pointer; font-weight: bold; }
        #notifications { background: #1e293b; padding: 15px; border-radius: 8px; margin-top: 20px; min-height: 100px; }
        .notification { background: #0f172a; padding: 10px; margin: 5px 0; border-radius: 4px; border-left: 3px solid #00ff87; }
    </style>
</head>
<body>
<h2>🔔 DevConnect WebSocket Test</h2>

<div>
    <input type="text" id="token" placeholder="Paste your JWT token here"/>
    <button onclick="connect()">Connect</button>
    <button onclick="disconnect()">Disconnect</button>
</div>

<div id="status" style="margin: 10px 0; color: #64748b;">Status: Disconnected</div>

<div id="notifications">
    <p style="color: #64748b;">Notifications will appear here...</p>
</div>

<script>
    let stompClient = null;

    function connect() {
        const token = document.getElementById('token').value;
        if(!token) { alert('Please enter JWT token'); return; }

        const socket = new SockJS('http://localhost:8080/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect(
            { 'Authorization': 'Bearer ' + token },
            function(frame) {
                document.getElementById('status').innerHTML =
                    '✅ Connected to DevConnect WebSocket!';
                document.getElementById('status').style.color = '#00ff87';

                // Subscribe to personal notifications
                stompClient.subscribe('/user/queue/notifications',
                    function(notification) {
                        showNotification(JSON.parse(notification.body));
                    }
                );
            },
            function(error) {
                document.getElementById('status').innerHTML =
                    '❌ Connection failed: ' + error;
                document.getElementById('status').style.color = '#f87171';
            }
        );
    }

    function disconnect() {
        if(stompClient) {
            stompClient.disconnect();
            document.getElementById('status').innerHTML =
                'Status: Disconnected';
            document.getElementById('status').style.color = '#64748b';
        }
    }

    function showNotification(data) {
        const div = document.getElementById('notifications');
        const item = document.createElement('div');
        item.className = 'notification';
        item.innerHTML = `
            <strong>${data.type}</strong> — ${data.message}
            <br><small style="color: #64748b">${data.createdAt}</small>
        `;
        div.prepend(item);
    }
</script>
</body>
</html>
